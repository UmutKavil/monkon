<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>⚡ monkon</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a202c;
      }
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        gap: 20px;
        color: #667eea;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #667eea;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading monkon...</p>
    </div>
    <div id="app" style="display:none; width:100%; height:100%;">
      <iframe id="dashboard"></iframe>
    </div>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          document.getElementById('dashboard').src = 'http://localhost:3000';
        }, 500);
      });
    </script>
  </body>
</html>
