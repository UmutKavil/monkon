<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="white"/>

  <!-- M Shape - Left -->
  <polygon points="60,80 80,160 100,100 120,160 140,80" fill="url(#grad1)"/>

  <!-- M Shape - Right -->
  <polygon points="140,80 160,160 180,100 200,160 220,80" fill="url(#grad2)"/>

  <!-- Orbit Ring -->
  <ellipse cx="128" cy="120" rx="90" ry="50" fill="none" stroke="url(#grad3)" stroke-width="8"/>

  <!-- Star -->
  <circle cx="200" cy="60" r="8" fill="#FFD700"/>
  <circle cx="205" cy="55" r="3" fill="#FFA500"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00CCCC;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CCCC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003366;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1"/>
    </linearGradient>
  </defs>
</svg>
