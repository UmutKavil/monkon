version: '3.9'

services:
  php:
    container_name: monkon-php
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    ports:
      - "${APACHE_PORT:-80}:80"
      - "${APACHE_SSL_PORT:-443}:443"
    volumes:
      - ${MONKON_WEB_ROOT:-~/monkon/www}:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/apache-config.conf:/etc/apache2/sites-available/000-default.conf:ro
    environment:
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      - mysql
    networks:
      - monkon-network
    restart: unless-stopped

  mysql:
    container_name: monkon-mysql
    image: mysql:${MYSQL_VERSION:-8.0}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - monkon-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - monkon-network
    restart: unless-stopped

  phpmyadmin:
    container_name: monkon-phpmyadmin
    image: phpmyadmin:latest
    ports:
      - "${PHPMYADMIN_PORT:-80}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - monkon-network
    restart: unless-stopped

volumes:
  monkon-mysql-data:

networks:
  monkon-network:
    driver: bridge
