services:
  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: monkon-php
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-512M}
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER:-monkon}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-monkon_password}
    volumes:
      - ${MONKON_WEB_ROOT:-~/monkon/www}:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - monkon-network

  # Apache Service
  apache:
    image: httpd:2.4-alpine
    container_name: monkon-apache
    restart: unless-stopped
    ports:
      - "${APACHE_PORT:-80}:80"
      - "${APACHE_SSL_PORT:-443}:443"
    volumes:
      - ${MONKON_WEB_ROOT:-~/monkon/www}:/var/www/html
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf.d/vhost.conf:ro
    networks:
      - monkon-network

  # MySQL Service
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: monkon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-REPLACE_WITH_SECURE_ROOT_PASSWORD}
      MYSQL_DATABASE: monkon_dev
      MYSQL_USER: ${MYSQL_USER:-monkon}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-monkon_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - monkon-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - monkon-network

  # PhpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: monkon-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-monkon}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-monkon_password}
      PMA_PORT: 3306
    ports:
      - "8080:80"
    networks:
      - monkon-network

volumes:
  monkon-mysql-data:
    driver: local

networks:
  monkon-network:
    driver: bridge
