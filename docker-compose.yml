version: '3.8'

services:
  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: monkon-php
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-512M}
      - MYSQL_HOST=mysql
      - MYSQL_USER=monkon
      - MYSQL_PASSWORD=monkon_password
    volumes:
      - ${MONKON_WEB_ROOT:-~/monkon/www}:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - monkon-network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Apache Service
  apache:
    image: httpd:2.4-alpine
    container_name: monkon-apache
    restart: unless-stopped
    ports:
      - "${APACHE_PORT:-80}:80"
      - "${APACHE_SSL_PORT:-443}:443"
    volumes:
      - ${MONKON_WEB_ROOT:-~/monkon/www}:/var/www/html
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf.d/vhost.conf:ro
      - monkon-apache-logs:/var/log/apache2
    depends_on:
      php:
        condition: service_healthy
    networks:
      - monkon-network

  # MySQL Service
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: monkon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: monkon_dev
      MYSQL_USER: monkon
      MYSQL_PASSWORD: monkon_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - monkon-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - monkon-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PhpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: monkon-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: monkon
      PMA_PASSWORD: monkon_password
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - monkon-network

volumes:
  monkon-mysql-data:
    driver: local
  monkon-apache-logs:
    driver: local

networks:
  monkon-network:
    driver: bridge
